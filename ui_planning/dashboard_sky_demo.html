<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canary AI</title>

  <!-- CDN Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Draggable.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/dashboard.css"/>

  <!-- Data (plain JS) -->
  <script src="data/stocks.js"></script>

  <!-- GSAP animation utilities (plain JS) -->
  <script src="animations/gsapAnimations.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Components: load order matters (leaves first, composites last) -->
<script type="text/babel" src="components/CanaryLogo.jsx"></script>
<script type="text/babel" src="components/SparkLine.jsx"></script>
<script type="text/babel" src="components/content/PortfolioContent.jsx"></script>
<script type="text/babel" src="components/content/ChatContent.jsx"></script>
<script type="text/babel" src="components/content/AccountContent.jsx"></script>
<script type="text/babel" src="components/content/SettingsContent.jsx"></script>
<script type="text/babel" src="components/content/PaymentContent.jsx"></script>
<script type="text/babel" src="components/WindowContent.jsx"></script>
<script type="text/babel" src="components/SkyLayer.jsx"></script>
<script type="text/babel" src="components/AppWindow.jsx"></script>
<script type="text/babel" src="components/Dock.jsx"></script>
<script type="text/babel" src="components/App.jsx"></script>

<!-- Mount -->
<script type="text/babel">
  const App = window.App;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
