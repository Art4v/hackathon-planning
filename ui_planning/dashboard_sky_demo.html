<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canary AI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { width:100%; height:100%; overflow:hidden; }
    body { font-family:'Segoe UI',system-ui,sans-serif; color:#1a1a1a; }

    /* ── DESKTOP ── */
    .desktop {
      width:100%; height:100%;
      background: #B8D8F8;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      user-select:none;
    }

    /* ── SKY ANIMATIONS ── */
    @keyframes drift {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-120%); }
    }
    @keyframes fly {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-200px); }
    }
    @keyframes flap {
      0%,100% { transform: scaleY(1) rotate(-10deg); }
      50%      { transform: scaleY(-0.5) rotate(10deg); }
    }

    /* ── CLOUDS ── */
    .cloud {
      position: absolute;
      left: 0;
      background: #fff;
      border-radius: 50px;
      opacity: 0.85;
      pointer-events: none;
      box-shadow: 0 4px 24px rgba(100,140,200,0.13);
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }
    .cloud::before {
      width: 55%; height: 170%;
      top: -55%; left: 15%;
    }
    .cloud::after {
      width: 38%; height: 140%;
      top: -45%; right: 18%;
    }

    /* ── CANARY BIRDS ── */
    .canary-bird {
      position: absolute;
      left: 0;
      pointer-events: none;
      animation: fly linear infinite;
    }
    .bird-wing {
      transform-origin: center center;
      animation: flap 0.4s ease-in-out infinite;
    }

    /* ── TOP-LEFT BRAND ── */
    .brand-corner {
      position:absolute; top:18px; left:22px;
      display:flex; align-items:center; gap:9px;
      z-index:5;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
    }
    .brand-name { font-size:1.1rem; font-weight:900; color:#1a1a1a; letter-spacing:-0.3px; }
    .brand-name em { color:#8FA4FF; font-style:normal; }

    /* ── TOP-RIGHT STATS ── */
    .stats-corner {
      position:absolute; top:16px; right:20px;
      display:flex; gap:10px; align-items:center;
      z-index:5;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
    }
    .stat-chip {
      display:flex; align-items:center; gap:5px;
      background:#fff; border:2.5px solid #ebebeb;
      border-radius:99px; padding:5px 12px 5px 9px;
      font-size:0.85rem; font-weight:800;
      box-shadow:0 3px 0 #e0e0e0;
    }

    /* ── CENTER DOCK ── */
    .dock-wrap {
      display:flex; flex-direction:column;
      align-items:center; gap:0;
      padding: 36px 48px 32px;
      pointer-events:auto;
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      border: 2px solid #A8BEFF;
      box-shadow: 0 8px 32px rgba(100,140,220,0.18), 4px 4px 0 #A8BEFF;
    }
    .mascot-wrap { animation:bob 4s ease-in-out infinite; margin-bottom:12px; }
    @keyframes bob {
      0%,100% { transform:translateY(0) rotate(-1.5deg); }
      50%      { transform:translateY(-12px) rotate(1.5deg); }
    }
    .dock-title { font-size:2rem; font-weight:900; color:#1a1a1a; letter-spacing:-1px; }
    .dock-title em { color:#8FA4FF; font-style:normal; }
    .dock-tagline {
      font-size:0.72rem; font-weight:700; color:#bbb;
      letter-spacing:2px; text-transform:uppercase;
      margin-bottom:28px; margin-top:4px;
    }
    .dock-icons { display:flex; gap:14px; }
    .dock-item { display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; }
    .dock-btn {
      width:72px; height:72px; border-radius:22px;
      border:3px solid; display:flex;
      align-items:center; justify-content:center;
      transition:transform 0.12s ease, box-shadow 0.12s ease;
      position:relative;
    }
    .dock-btn:hover  { transform:translateY(-3px); }
    .dock-btn:active { transform:translateY(4px); box-shadow:none !important; }
    .dock-dot {
      position:absolute; bottom:-4px;
      width:6px; height:6px; border-radius:50%;
      background:#1a1a1a; opacity:0;
      transition:opacity 0.2s;
    }
    .dock-dot.visible { opacity:1; }
    .dock-label { font-size:0.68rem; font-weight:800; color:#999; text-transform:uppercase; letter-spacing:0.5px; }

    /* ── WINDOW ── */
    @keyframes win-open {
      from { opacity:0; transform:scale(0.94) translateY(10px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .app-window {
      position:absolute;
      background:#fff;
      border-radius:16px;
      border:2px solid #d8d8d8;
      box-shadow:0 16px 50px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.07);
      display:flex; flex-direction:column;
      overflow:hidden;
      animation:win-open 0.18s ease;
    }
    .win-titlebar {
      padding:11px 16px;
      display:flex; justify-content:space-between; align-items:center;
      cursor:inherit; flex-shrink:0;
      border-bottom:3px solid;
    }
    .win-title { font-size:0.86rem; font-weight:800; letter-spacing:0.1px; }
    .win-close {
      background:none; border:none;
      cursor:pointer; font-size:0.82rem; font-weight:700;
      font-family:monospace; padding:3px 6px; border-radius:8px;
      border:2px solid transparent;
      transition:background 0.12s, border-color 0.12s;
      opacity:0.6;
    }
    .win-close:hover { opacity:1; background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.12); }
    .win-body { flex:1; overflow-y:auto; overflow-x:hidden; }

    /* ── 8-WAY RESIZE HANDLES ── */
    .rh { position:absolute; z-index:20; }
    .rh-n  { top:0;    left:10px; right:10px;  height:5px;  cursor:n-resize;  }
    .rh-s  { bottom:0; left:10px; right:10px;  height:5px;  cursor:s-resize;  }
    .rh-w  { left:0;   top:10px;  bottom:10px; width:5px;   cursor:w-resize;  }
    .rh-e  { right:0;  top:10px;  bottom:10px; width:5px;   cursor:e-resize;  }
    .rh-nw { top:0;    left:0;  width:12px; height:12px; cursor:nw-resize; }
    .rh-ne { top:0;    right:0; width:12px; height:12px; cursor:ne-resize; }
    .rh-sw { bottom:0; left:0;  width:12px; height:12px; cursor:sw-resize; }
    .rh-se { bottom:0; right:0; width:12px; height:12px; cursor:se-resize; }
    /* SE grip visual */
    .rh-se::after {
      content:''; position:absolute; right:4px; bottom:4px;
      width:7px; height:7px;
      border-right:2.5px solid rgba(0,0,0,0.2); border-bottom:2.5px solid rgba(0,0,0,0.2);
      border-radius:1px;
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#e0e0e0; border-radius:4px; }

    /* ── CHAT ── */
    .chat-wrap { background:#f7f9ff; height:100%; display:flex; flex-direction:column; }
    .chat-header {
      background:#D6E4FF; border-bottom:2.5px solid #A8BEFF;
      padding:12px 18px; display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .chat-header-icon {
      width:36px; height:36px; border-radius:50%;
      background:#fff; border:2px solid #A8BEFF;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .chat-header-name  { font-size:0.88rem; font-weight:800; color:#1e3a8a; }
    .chat-header-status{ font-size:0.62rem; color:#4a6cf7; font-weight:700; margin-top:1px; }
    .chat-messages {
      flex:1; overflow-y:auto; padding:16px 18px;
      display:flex; flex-direction:column; gap:12px;
    }
    .chat-msg { display:flex; gap:9px; align-items:flex-end; }
    .chat-msg.user { flex-direction:row-reverse; }
    .chat-bubble {
      max-width:72%; padding:10px 16px;
      border-radius:22px; font-size:0.82rem; font-weight:600; line-height:1.5;
    }
    .chat-msg.ai   .chat-bubble { background:#D6E4FF; color:#1e3a8a; border-bottom-left-radius:6px; }
    .chat-msg.user .chat-bubble { background:#4a6cf7; color:#fff; border-bottom-right-radius:6px; }
    .chat-time { font-size:0.6rem; color:#aaa; font-weight:600; margin-top:3px; }
    .chat-input-area {
      background:#fff; border-top:2px solid #e8eeff;
      padding:12px 14px; display:flex; gap:10px; flex-shrink:0;
    }
    .chat-input {
      flex:1; padding:10px 14px; border:2px solid #A8BEFF;
      border-radius:12px; font-size:0.82rem; outline:none; font-family:inherit;
      background:#f7f9ff; color:#111;
    }
    .chat-input:focus { border-color:#4a6cf7; }
    .chat-input::placeholder { color:#aaa; }
    .chat-send {
      background:#4a6cf7; color:#fff; border:none; border-radius:12px;
      padding:10px 14px; font-size:0.82rem; cursor:pointer; font-family:inherit;
      display:flex; align-items:center; transition:opacity 0.15s;
      box-shadow:0 3px 0 #2a4cd7;
    }
    .chat-send:hover { opacity:0.88; }
    .chat-send:active { transform:translateY(2px); box-shadow:none; }

    /* ─────────────────────────────────────
       PORTFOLIO CONTENT
    ───────────────────────────────────── */
    .pf-banner {
      background:#FFF8A0; border-bottom:2.5px solid #FFE566;
      padding:18px 20px; display:flex;
      justify-content:space-between; align-items:center;
    }
    .pf-val { font-size:1.7rem; font-weight:900; letter-spacing:-1px; line-height:1; }
    .pf-val span { font-size:1rem; color:#aaa; }
    .pf-lbl { font-size:0.65rem; color:#aaa; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
    .pf-chg {
      display:inline-flex; align-items:center; gap:4px;
      margin-top:6px; font-size:0.78rem; font-weight:800;
      background:#d1fae5; color:#16a34a; padding:3px 10px;
      border-radius:99px; border:2px solid #bbf7d0;
    }
    .pf-stats { display:flex; gap:10px; }
    .pf-stat {
      background:rgba(255,255,255,0.7); border:2px solid rgba(255,229,102,0.5);
      border-radius:12px; padding:8px 14px; text-align:center; min-width:70px;
    }
    .pf-stat-v { font-size:1rem; font-weight:900; }
    .pf-stat-l { font-size:0.6rem; color:#bbb; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

    .stock-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:14px; }

    .bubble-card-wrap { border-radius:20px; cursor:pointer; transition:transform 0.12s, box-shadow 0.12s; }
    .bubble-card-wrap:hover  { transform:translateY(3px); }
    .bubble-card-wrap:active { transform:translateY(6px); }
    .bubble-card { background:#fff; border-radius:18px; border:3px solid; overflow:hidden; }
    .card-header {
      padding:12px 14px 10px; display:flex;
      justify-content:space-between; align-items:flex-start;
      border-bottom:3px solid;
    }
    .card-ticker { font-size:1.2rem; font-weight:900; letter-spacing:-0.3px; line-height:1; }
    .card-company { font-size:0.65rem; font-weight:700; opacity:0.6; margin-top:2px; }
    .card-price { font-size:0.95rem; font-weight:900; text-align:right; line-height:1; }
    .card-pill {
      display:inline-flex; align-items:center; gap:2px;
      font-size:0.66rem; font-weight:800; padding:2px 7px;
      border-radius:99px; margin-top:4px;
      background:rgba(255,255,255,0.55); border:2px solid rgba(0,0,0,0.06);
    }
    .card-pill.up { color:#15803d; } .card-pill.dn { color:#dc2626; }
    .card-chart { padding:10px 12px 6px; }
    .chart-svg { width:100%; height:56px; }
    .card-footer {
      padding:7px 12px 10px; display:flex;
      justify-content:space-between; align-items:center;
    }
    .vol-pill { font-size:0.62rem; font-weight:700; color:#999; background:#f5f5f5; border:2px solid #ebebeb; border-radius:99px; padding:3px 8px; }
    .rpills { display:flex; gap:3px; }
    .rpill { font-size:0.6rem; padding:3px 7px; border-radius:99px; cursor:pointer; border:2px solid #ddd; color:#aaa; background:none; font-weight:800; transition:all 0.12s; }
    .rpill.ay { background:#FFF8A0; color:#7a6c00; border-color:#FFE566; }
    .rpill.ab { background:#D6E4FF; color:#3b52c4; border-color:#A8BEFF; }
    .rpill.ag { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .rpill.ar { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }

    /* ─────────────────────────────────────
       CHAT CONTENT
    ───────────────────────────────────── */
    .chat-header {
      padding:14px 18px; border-bottom:2px solid #f0f0f0;
      display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .chat-avatar {
      width:36px; height:36px; border-radius:12px;
      background:#FFF8A0; border:2.5px solid #FFE566;
      display:flex; align-items:center; justify-content:center;
    }
    .chat-name { font-size:0.9rem; font-weight:800; }
    .chat-status { font-size:0.65rem; color:#16a34a; font-weight:700; }
    .chat-messages { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
    .msg { display:flex; gap:8px; align-items:flex-end; }
    .msg.user { flex-direction:row-reverse; }
    .msg-bubble {
      max-width:75%; padding:10px 13px;
      border-radius:16px; font-size:0.8rem; line-height:1.5; font-weight:500;
    }
    .msg.ai .msg-bubble { background:#f5f5f5; border-bottom-left-radius:4px; }
    .msg.user .msg-bubble { background:#D6E4FF; border:2px solid #A8BEFF; border-bottom-right-radius:4px; color:#1e3a8a; }
    .msg-time { font-size:0.6rem; color:#ccc; font-weight:600; flex-shrink:0; }
    .chat-input-area {
      padding:12px 14px; border-top:2px solid #f0f0f0;
      display:flex; gap:8px; flex-shrink:0;
    }
    .chat-input {
      flex:1; padding:9px 13px; border:2.5px solid #e5e5e5;
      border-radius:12px; font-size:0.82rem; outline:none;
      font-family:inherit; transition:border-color 0.15s;
    }
    .chat-input:focus { border-color:#A8BEFF; }
    .chat-send {
      background:#D6E4FF; color:#3b52c4; border:2.5px solid #A8BEFF;
      border-radius:12px; padding:8px 14px; font-weight:800;
      font-size:0.78rem; cursor:pointer;
      box-shadow:0 3px 0 #8090e0;
      transition:transform 0.1s, box-shadow 0.1s;
    }
    .chat-send:hover  { transform:translateY(1px); box-shadow:0 2px 0 #8090e0; }
    .chat-send:active { transform:translateY(3px); box-shadow:none; }

    /* ─────────────────────────────────────
       ACCOUNT CONTENT
    ───────────────────────────────────── */
    .acct-hero {
      background:linear-gradient(135deg,#d1fae5,#a7f3d0);
      border-bottom:2.5px solid #6ee7b7;
      padding:24px 20px; display:flex;
      flex-direction:column; align-items:center; gap:10px;
    }
    .acct-avatar {
      width:72px; height:72px; border-radius:20px;
      border:3px solid #6ee7b7; background:#fff;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 0 #34d399;
    }
    .acct-name { font-size:1.1rem; font-weight:900; }
    .acct-email { font-size:0.72rem; color:#555; font-weight:600; }
    .acct-stats { display:flex; gap:10px; margin-top:4px; }
    .acct-stat {
      background:rgba(255,255,255,0.7); border:2px solid rgba(110,231,183,0.5);
      border-radius:12px; padding:8px 12px; text-align:center; min-width:72px;
    }
    .acct-stat-v { font-size:1rem; font-weight:900; }
    .acct-stat-l { font-size:0.58rem; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:1px; }
    .acct-rows { padding:14px 18px; display:flex; flex-direction:column; gap:1px; }
    .acct-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:11px 0; border-bottom:1px solid #f5f5f5;
    }
    .acct-row:last-child { border-bottom:none; }
    .acct-row-label { font-size:0.78rem; color:#888; font-weight:700; display:flex; align-items:center; gap:8px; }
    .acct-row-val { font-size:0.82rem; font-weight:800; }

    /* ─────────────────────────────────────
       SETTINGS CONTENT
    ───────────────────────────────────── */
    .settings-section { padding:16px 18px; }
    .settings-title { font-size:0.65rem; font-weight:800; color:#bbb; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
    .setting-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:11px 0; border-bottom:1px solid #f5f5f5;
    }
    .setting-row:last-child { border-bottom:none; }
    .setting-label { font-size:0.82rem; font-weight:700; display:flex; align-items:center; gap:9px; }
    .setting-sub { font-size:0.66rem; color:#bbb; font-weight:600; margin-top:2px; }
    .toggle {
      width:44px; height:24px; border-radius:99px; border:2.5px solid;
      position:relative; cursor:pointer; transition:background 0.2s, border-color 0.2s;
      flex-shrink:0;
    }
    .toggle::after {
      content:''; position:absolute; top:2px; left:2px;
      width:16px; height:16px; border-radius:50%; background:#fff;
      transition:transform 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.15);
    }
    .toggle.on::after { transform:translateX(20px); }
    .toggle.off { background:#e5e5e5; border-color:#d0d0d0; }
    .toggle.on  { background:#A8BEFF; border-color:#8090e0; }

    /* ─────────────────────────────────────
       PAYMENT CONTENT
    ───────────────────────────────────── */
    .pay-tabs { display:flex; border-bottom:2.5px solid #f0f0f0; flex-shrink:0; }
    .pay-tab {
      flex:1; padding:13px; text-align:center;
      font-size:0.82rem; font-weight:800; cursor:pointer;
      border-bottom:3px solid transparent; transition:all 0.15s;
      color:#bbb; margin-bottom:-2.5px;
    }
    .pay-tab.buy.active  { color:#16a34a; border-color:#16a34a; }
    .pay-tab.sell.active { color:#dc2626; border-color:#dc2626; }
    .pay-form { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
    .pay-field label { display:block; font-size:0.68rem; font-weight:800; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .pay-select, .pay-input {
      width:100%; padding:10px 13px; border:2.5px solid #e5e5e5;
      border-radius:12px; font-size:0.85rem; outline:none;
      font-family:inherit; font-weight:600; background:#fff;
      transition:border-color 0.15s;
    }
    .pay-select:focus, .pay-input:focus { border-color:#A8BEFF; }
    .pay-row { display:flex; gap:10px; }
    .pay-row .pay-field { flex:1; }
    .pay-preview {
      background:#f8f8f8; border:2px solid #ebebeb; border-radius:14px;
      padding:13px 15px; font-size:0.8rem;
    }
    .pay-preview-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
    .pay-preview-label { color:#aaa; font-weight:600; }
    .pay-preview-val   { font-weight:800; }
    .pay-btn {
      border:3px solid; border-radius:14px; padding:13px;
      font-size:0.88rem; font-weight:900; cursor:pointer;
      transition:transform 0.1s, box-shadow 0.1s; letter-spacing:0.2px;
    }
    .pay-btn.buy-btn  { background:#d1fae5; color:#065f46; border-color:#6ee7b7; box-shadow:0 4px 0 #34d399; }
    .pay-btn.sell-btn { background:#fee2e2; color:#7f1d1d; border-color:#fca5a5; box-shadow:0 4px 0 #f87171; }
    .pay-btn:hover  { transform:translateY(2px); }
    .pay-btn:active { transform:translateY(4px); box-shadow:none !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ── CANARY LOGO ── */
const CanaryLogo = ({ size=36 }) => (
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
    {/* Body */}
    <ellipse cx="20" cy="27" rx="10" ry="9" fill="#FFE500"/>
    {/* Head */}
    <circle cx="20" cy="15" r="8.5" fill="#FFE500"/>
    {/* Eyes */}
    <circle cx="17" cy="14" r="2" fill="#222"/>
    <circle cx="23" cy="14" r="2" fill="#222"/>
    <circle cx="17.7" cy="13.3" r="0.7" fill="white"/>
    <circle cx="23.7" cy="13.3" r="0.7" fill="white"/>
    {/* Beak */}

/* ── SPARKLINE ── */
function SparkLine({ data, color, fillColor }) {
  const W=260, H=55;
  const min=Math.min(...data), max=Math.max(...data), range=max-min||1;
  const pts = data.map((v,i) => {
    const x=(i/(data.length-1))*W;
    const y=H-((v-min)/range)*(H-10)-3;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="chart-svg">
      <polygon points={`0,${H} ${pts.join(' ')} ${W},${H}`} fill={fillColor}/>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="2.5"
        strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

/* ── APP ── */
function App() {
  const dragRef   = useRef(null);
  const resizeRef = useRef(null);
  const [grabbing, setGrabbing] = useState(null);
  const [zCounter, setZCounter] = useState(200);
  const [windows, setWindows] = useState(
    DOCK_ITEMS.map((d, i) => ({
      id:d.id, title:d.id,
      x: window.innerWidth/2 - d.defaultW/2 + (i-2)*30,
      y: window.innerHeight/2 - d.defaultH/2 + (i-2)*25,
      width:d.defaultW, height:d.defaultH,
      minW:d.minW, minH:d.minH,
      open:false, z:100+i,
    }))
  );

  /* global mouse handlers */
  useEffect(() => {
    const onMove = (e) => {
      if (dragRef.current) {
        const { id, sx, sy, ox, oy } = dragRef.current;
        setWindows(ws => ws.map(w => w.id===id
          ? { ...w,
              x: Math.min(window.innerWidth  - w.width,  Math.max(0, ox+e.clientX-sx)),
              y: Math.min(window.innerHeight - w.height, Math.max(0, oy+e.clientY-sy)) }
          : w));
      }
      if (resizeRef.current) {
        const { id, dir, sx, sy, ox, oy, ow, oh, minW, minH } = resizeRef.current;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        const vW = window.innerWidth, vH = window.innerHeight;
        let nX=ox, nY=oy, nW=ow, nH=oh;
        if (dir.includes('e')) nW = Math.min(vW - ox, Math.max(minW, ow + dx));
        if (dir.includes('s')) nH = Math.min(vH - oy, Math.max(minH, oh + dy));
        if (dir.includes('w')) {
          nW = Math.max(minW, ow - dx);
          nX = Math.max(0, ox + (ow - nW));
          nW = ox + ow - nX;
          nW = Math.max(minW, nW);
        }
        if (dir.includes('n')) {
          nH = Math.max(minH, oh - dy);
          nY = Math.max(0, oy + (oh - nH));
          nH = oy + oh - nY;
          nH = Math.max(minH, nH);
        }
        setWindows(ws => ws.map(w => w.id===id ? { ...w, x:nX, y:nY, width:nW, height:nH } : w));
      }
    };
    const onUp = () => { dragRef.current=null; resizeRef.current=null; setGrabbing(null); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);

  const bringToFront = useCallback((id) => {
    setZCounter(z => {
      const next = z + 1;
      setWindows(ws => ws.map(w => w.id===id ? {...w, z:next} : w));
      return next;
    });
  }, []);

  const openWindow = useCallback((id) => {
    setZCounter(z => {
      const next = z + 1;
      setWindows(ws => ws.map(w => w.id===id ? {...w, open:true, z:next} : w));
      return next;
    });
  }, []);

  const closeWindow = useCallback((id) => {
    setWindows(ws => ws.map(w => w.id===id ? {...w, open:false} : w));
  }, []);

  const startDrag = useCallback((e, id, ox, oy) => {
    e.preventDefault();
    bringToFront(id);
    dragRef.current = { id, sx:e.clientX, sy:e.clientY, ox, oy };
    setGrabbing(id);
  }, [bringToFront]);

  const startResize = useCallback((e, id, dir) => {
    e.preventDefault();
    const win = windows.find(w=>w.id===id);
    resizeRef.current = { id, dir, sx:e.clientX, sy:e.clientY, ox:win.x, oy:win.y, ow:win.width, oh:win.height, minW:win.minW, minH:win.minH };
  }, [windows]);

  return (
    <div className="desktop">
      <SkyLayer/>
      {/* Brand corner */}
      <div className="brand-corner">
        <CanaryLogo size={28}/>
        <div className="brand-name">Canary <em>AI</em></div>
      </div>

      {/* Center dock */}
      <div className="dock-wrap">
        <div className="mascot-wrap"><CanaryLogo size={80}/></div>
        <div className="dock-title">Canary <em>AI</em></div>
        <div className="dock-tagline">The trader you always wanted to be</div>
        <div className="dock-icons">
          {DOCK_ITEMS.map(d => {
            const isOpen = windows.find(w=>w.id===d.id)?.open;
            return (
              <div key={d.id} className="dock-item" onClick={()=>openWindow(d.id)}>
                <div className="dock-btn"
                  style={{ background:d.bg, borderColor:d.border, boxShadow:`0 5px 0 ${d.shadow}` }}>
                  <iconify-icon icon={d.icon} width="32" style={{color:d.iconColor}}/>
                  <div className={`dock-dot ${isOpen?'visible':''}`}/>
                </div>
                <div className="dock-label">{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Windows */}
      {windows.filter(w=>w.open).map(win => {
        const theme = DOCK_ITEMS.find(d=>d.id===win.id);
        return (
          <AppWindow key={win.id}
            win={win}
            theme={theme}
            grabbing={grabbing}
            onClose={closeWindow}
            onFocus={bringToFront}
            onDragStart={startDrag}
            onResizeStart={startResize}/>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
