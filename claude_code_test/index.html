<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
    }
    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.2em;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc88;
    }
    .games {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: #12121e;
      border: 1px solid #00ffcc44;
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .card:hover {
      border-color: #00ffcc;
      box-shadow: 0 0 24px #00ffcc44;
      transform: translateY(-4px);
    }
    .card .icon { font-size: 3rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.3rem; letter-spacing: 0.1em; color: #00ffcc; margin-bottom: 8px; }
    .card p { font-size: 0.85rem; color: #888; }
    footer { font-size: 0.75rem; color: #444; }
  </style>
</head>
<body>
  <h1>GAME ARCADE</h1>
  <div class="games">
    <a class="card" href="tictactoe.html">
      <div class="icon">⭕</div>
      <h2>TIC-TAC-TOE</h2>
      <p>Classic 3×3 strategy game</p>
    </a>
    <a class="card" href="shooter/shooter.html">
      <div class="icon">🚀</div>
      <h2>NEON ASSAULT</h2>
      <p>Top-down retro shooter · 5 levels</p>
    </a>
  </div>
  <footer>Open in browser · No server needed for direct file access</footer>
</body>
</html>
