<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON ASSAULT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ─── Canvas Setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── State Machine ─────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_CLEAR: 2, GAME_OVER: 3, WIN: 4 };
let gameState = STATE.MENU;

// ─── Input ─────────────────────────────────────────────────────────────────
const keys   = {};
const mouse  = { x: canvas.width / 2, y: canvas.height / 2, down: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (gameState === STATE.MENU && (e.code === 'Enter' || e.code === 'Space')) startGame();
  if ((gameState === STATE.GAME_OVER || gameState === STATE.WIN) && (e.code === 'Enter' || e.code === 'Space')) { gameState = STATE.MENU; }
});
window.addEventListener('keyup',   e => { keys[e.code] = false; });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { if (e.button === 0) { mouse.down = true; } });
window.addEventListener('mouseup',   e => { if (e.button === 0) { mouse.down = false; } });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─── Level Definitions ─────────────────────────────────────────────────────
const LEVELS = [
  { total: 8,  interval: 120, speedMul: 1.0,  hpMul: 1.0,  dist: { grunt:1.0,  runner:0,    tank:0    } },
  { total: 14, interval: 100, speedMul: 1.1,  hpMul: 1.0,  dist: { grunt:0.75, runner:0.25, tank:0    } },
  { total: 20, interval: 80,  speedMul: 1.25, hpMul: 1.1,  dist: { grunt:0.5,  runner:0.4,  tank:0.1  } },
  { total: 28, interval: 60,  speedMul: 1.4,  hpMul: 1.25, dist: { grunt:0.4,  runner:0.4,  tank:0.2  } },
  { total: 38, interval: 45,  speedMul: 1.6,  hpMul: 1.5,  dist: { grunt:0.3,  runner:0.4,  tank:0.3  } },
];

const BASE_STATS = {
  grunt:  { r: 12, speed: 1.5, hp: 20, damage: 0.15, score: 10,  color: '#ff3366' },
  runner: { r: 10, speed: 3.0, hp: 10, damage: 0.10, score: 15,  color: '#ff8800' },
  tank:   { r: 18, speed: 0.8, hp: 80, damage: 0.25, score: 30,  color: '#aa00ff' },
};

// ─── Game Variables ─────────────────────────────────────────────────────────
let player, bullets, enemies, particles;
let level, levelDef;
let spawned, spawnTimer, levelClearTimer;
let shakeTimer, shakeX, shakeY;
let highScore;

// ─── Init ──────────────────────────────────────────────────────────────────
function init() {
  highScore = parseInt(localStorage.getItem('neonAssaultHS') || '0', 10);
  gameLoop(0);
}

function startGame() {
  level   = 1;
  levelDef = LEVELS[level - 1];
  player = {
    x: canvas.width / 2, y: canvas.height / 2,
    r: 14, speed: 3.5,
    hp: 100, maxHp: 100,
    angle: 0, score: 0,
    walkFrame: 0, walkTimer: 0, walkFrameRate: 8,
    shootTimer: 0, shootCooldown: 12, shootAnimTimer: 0,
    invTimer: 0,
  };
  bullets    = [];
  enemies    = [];
  particles  = [];
  spawned    = 0;
  spawnTimer = 0;
  shakeTimer = 0; shakeX = 0; shakeY = 0;
  gameState  = STATE.PLAYING;
}

function loadNextLevel() {
  level++;
  if (level > LEVELS.length) { gameState = STATE.WIN; return; }
  levelDef   = LEVELS[level - 1];
  bullets    = [];
  enemies    = [];
  particles  = [];
  spawned    = 0;
  spawnTimer = 0;
  gameState  = STATE.PLAYING;
}

// ─── Utility ───────────────────────────────────────────────────────────────
function circlesOverlap(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const rr = a.r + b.r;
  return dx*dx + dy*dy < rr*rr;
}

function getSpawnPosition() {
  const W = canvas.width, H = canvas.height;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -30; }
  else if (edge === 1) { x = W + 30; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 30; }
  else { x = -30; y = Math.random() * H; }
  return { x, y };
}

function pickType(dist) {
  const r = Math.random();
  if (r < dist.grunt) return 'grunt';
  if (r < dist.grunt + dist.runner) return 'runner';
  return 'tank';
}

function spawnEnemy(def) {
  const type = pickType(def.dist);
  const base = BASE_STATS[type];
  const pos  = getSpawnPosition();
  enemies.push({
    x: pos.x, y: pos.y,
    r: base.r,
    hp: base.hp * def.hpMul,
    maxHp: base.hp * def.hpMul,
    speed: base.speed * def.speedMul,
    damage: base.damage,
    scoreValue: base.score,
    type,
    angle: 0,
    walkFrame: 0, walkTimer: 0,
    walkFrameRate: type === 'runner' ? 4 : (type === 'tank' ? 14 : 8),
    color: base.color,
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang  = Math.random() * Math.PI * 2;
    const spd  = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 20, maxLife: 20,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function tryShoot() {
  if (player.shootTimer > 0) return;
  const spd = 10;
  bullets.push({
    x: player.x + Math.cos(player.angle) * 20,
    y: player.y + Math.sin(player.angle) * 20,
    vx: Math.cos(player.angle) * spd,
    vy: Math.sin(player.angle) * spd,
    r: 4,
    lifetime: 90,
    trail: [],
  });
  player.shootTimer    = player.shootCooldown;
  player.shootAnimTimer = 8;
}

// ─── Update ────────────────────────────────────────────────────────────────
function updatePlayer() {
  if (gameState !== STATE.PLAYING) return;

  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) dy += 1;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.r, Math.min(canvas.width  - player.r, player.x + dx * player.speed));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y + dy * player.speed));

  // Walk animation
  if (dx !== 0 || dy !== 0) {
    player.walkTimer++;
    if (player.walkTimer >= player.walkFrameRate) {
      player.walkTimer = 0;
      player.walkFrame = (player.walkFrame + 1) % 4;
    }
  }

  // Aim
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shoot timers
  if (player.shootTimer > 0) player.shootTimer--;
  if (player.shootAnimTimer > 0) player.shootAnimTimer--;

  // Shoot on hold
  if (mouse.down) tryShoot();

  // Invincibility
  if (player.invTimer > 0) player.invTimer--;
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();
    b.x += b.vx;
    b.y += b.vy;
    b.lifetime--;
    if (b.lifetime <= 0 || b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
      bullets.splice(i, 1);
    }
  }
}

function updateEnemies() {
  for (const e of enemies) {
    const dx  = player.x - e.x;
    const dy  = player.y - e.y;
    e.angle   = Math.atan2(dy, dx);
    e.x      += Math.cos(e.angle) * e.speed;
    e.y      += Math.sin(e.angle) * e.speed;

    // Walk animation
    e.walkTimer++;
    if (e.walkTimer >= e.walkFrameRate) {
      e.walkTimer = 0;
      e.walkFrame = (e.walkFrame + 1) % 4;
    }

    // Contact damage
    if (player.invTimer === 0 && circlesOverlap(e, player)) {
      player.hp      -= e.damage;
      player.invTimer = 60;
      shakeTimer      = 8;
      if (player.hp <= 0) {
        player.hp  = 0;
        gameState  = STATE.GAME_OVER;
        if (player.score > highScore) {
          highScore = player.score;
          localStorage.setItem('neonAssaultHS', highScore);
        }
      }
    }
  }
}

function checkBulletEnemyCollisions() {
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (circlesOverlap(b, e)) {
        hit = true;
        e.hp -= 10;
        spawnParticles(b.x, b.y, e.color, 5);
        if (e.hp <= 0) {
          player.score += e.scoreValue;
          spawnParticles(e.x, e.y, e.color, 15);
          enemies.splice(ei, 1);
        }
        break;
      }
    }
    if (hit) { bullets.splice(bi, 1); }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x   += p.vx;
    p.y   += p.vy;
    p.vx  *= 0.9;
    p.vy  *= 0.9;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateSpawner() {
  if (spawned >= levelDef.total) return;
  spawnTimer++;
  if (spawnTimer >= levelDef.interval) {
    spawnTimer = 0;
    spawnEnemy(levelDef);
    spawned++;
  }
}

function updateShake() {
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * 10;
    shakeY = (Math.random() - 0.5) * 10;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

function update() {
  if (gameState === STATE.PLAYING) {
    updatePlayer();
    updateBullets();
    updateSpawner();
    updateEnemies();
    checkBulletEnemyCollisions();
    updateParticles();
    updateShake();

    // Check level clear
    if (spawned >= levelDef.total && enemies.length === 0) {
      gameState       = STATE.LEVEL_CLEAR;
      levelClearTimer = 180; // 3 sec at 60fps
    }
  } else if (gameState === STATE.LEVEL_CLEAR) {
    updateParticles();
    levelClearTimer--;
    if (levelClearTimer <= 0) loadNextLevel();
  }
}

// ─── Draw Helpers ──────────────────────────────────────────────────────────
function glowText(text, x, y, color, size, blur) {
  ctx.save();
  ctx.font         = `bold ${size}px monospace`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = color;
  ctx.shadowBlur   = blur || 20;
  ctx.fillStyle    = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur   = 0;
  ctx.fillStyle    = '#ffffff';
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ─── Draw Player ───────────────────────────────────────────────────────────
function drawPlayer() {
  if (player.invTimer > 0 && Math.floor(player.invTimer / 4) % 2 === 0) return;

  const { x, y, angle, walkFrame, shootAnimTimer } = player;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (two small rects animated)
  const legOff = Math.sin(walkFrame * Math.PI / 2) * 5;
  ctx.fillStyle = '#00bb99';
  ctx.fillRect(-6, 4 + legOff, 4, 8);
  ctx.fillRect(2,  4 - legOff, 4, 8);

  // Body
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur  = 12;
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Head overlay
  ctx.fillStyle = '#ccffee';
  ctx.beginPath();
  ctx.arc(0, -3, 5, 0, Math.PI * 2);
  ctx.fill();

  // Gun (rotated to aim)
  ctx.rotate(angle);
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur  = 8;
  ctx.fillRect(8, -3, 16, 6);
  ctx.shadowBlur = 0;

  // Muzzle flash
  if (shootAnimTimer > 0) {
    const alpha = shootAnimTimer / 8;
    ctx.fillStyle = `rgba(255,255,100,${alpha})`;
    ctx.shadowColor = '#ffff44';
    ctx.shadowBlur  = 20;
    ctx.beginPath();
    ctx.arc(26, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    // Radial lines
    ctx.strokeStyle = `rgba(255,220,50,${alpha})`;
    ctx.lineWidth   = 1.5;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(26 + Math.cos(a) * 7, Math.sin(a) * 7);
      ctx.lineTo(26 + Math.cos(a) * 13, Math.sin(a) * 13);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// ─── Draw Enemy ────────────────────────────────────────────────────────────
function drawGrunt(e) {
  const legOff = Math.sin(e.walkFrame * Math.PI / 2) * 4;
  ctx.fillStyle = '#cc2244';
  ctx.fillRect(-7, 4 + legOff, 5, 7);
  ctx.fillRect(2,  4 - legOff, 5, 7);

  ctx.fillStyle = e.color;
  ctx.shadowColor = e.color;
  ctx.shadowBlur  = 10;
  ctx.fillRect(-7, -7, 14, 14);
  ctx.shadowBlur = 0;

  // Head
  ctx.fillStyle = '#ff6688';
  ctx.beginPath();
  ctx.arc(0, -5, 6, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-3, -7, 2, 2);
  ctx.fillRect(1,  -7, 2, 2);
}

function drawRunner(e) {
  const legOff = Math.sin(e.walkFrame * Math.PI / 2) * 6;
  // Speed lines
  ctx.strokeStyle = 'rgba(255,136,0,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const off = (i - 1) * 4;
    ctx.beginPath();
    ctx.moveTo(-10, off);
    ctx.lineTo(-18, off);
    ctx.stroke();
  }

  ctx.fillStyle = '#cc5500';
  ctx.fillRect(-4, 5 + legOff, 3, 9);
  ctx.fillRect(1,  5 - legOff, 3, 9);

  ctx.fillStyle = e.color;
  ctx.shadowColor = e.color;
  ctx.shadowBlur  = 10;
  ctx.fillRect(-4, -8, 8, 16);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffaa44';
  ctx.beginPath();
  ctx.arc(0, -7, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawTank(e) {
  const legOff = Math.sin(e.walkFrame * Math.PI / 2) * 3;
  ctx.fillStyle = '#660099';
  ctx.fillRect(-9, 6 + legOff, 7, 10);
  ctx.fillRect(2,  6 - legOff, 7, 10);

  ctx.fillStyle = e.color;
  ctx.shadowColor = e.color;
  ctx.shadowBlur  = 14;
  ctx.fillRect(-11, -11, 22, 22);
  ctx.shadowBlur = 0;

  // Shoulder pads
  ctx.fillStyle = '#cc44ff';
  ctx.fillRect(-15, -8, 5, 8);
  ctx.fillRect(10,  -8, 5, 8);

  // Head
  ctx.fillStyle = '#cc88ff';
  ctx.beginPath();
  ctx.arc(0, -9, 7, 0, Math.PI * 2);
  ctx.fill();

  // HP bar above
  const barW = 36, barH = 4;
  const pct  = e.hp / e.maxHp;
  ctx.fillStyle = '#330033';
  ctx.fillRect(-barW/2, -e.r - 12, barW, barH);
  ctx.fillStyle = pct > 0.5 ? '#aa00ff' : '#ff0088';
  ctx.fillRect(-barW/2, -e.r - 12, barW * pct, barH);
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(e.angle + Math.PI / 2);
  if      (e.type === 'grunt')  drawGrunt(e);
  else if (e.type === 'runner') drawRunner(e);
  else                           drawTank(e);
  ctx.restore();
}

// ─── Draw Bullets ──────────────────────────────────────────────────────────
function drawBullets() {
  for (const b of bullets) {
    // Trail
    for (let i = 0; i < b.trail.length; i++) {
      const t     = b.trail[i];
      const alpha = (i / b.trail.length) * 0.6;
      ctx.fillStyle = `rgba(255,140,0,${alpha})`;
      const r = 2 * (i / b.trail.length);
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    // Bullet
    ctx.fillStyle    = '#ffff44';
    ctx.shadowColor  = '#ffff44';
    ctx.shadowBlur   = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ─── Draw Particles ────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Draw Background ───────────────────────────────────────────────────────
function drawBackground() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  const warm  = Math.min(level - 1, 4) * 3;
  const gc    = `rgb(${17 + warm},${17},${24})`;
  ctx.strokeStyle = gc;
  ctx.lineWidth   = 1;
  const step  = 40;
  for (let gx = 0; gx < W; gx += step) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += step) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }
}

// ─── Draw HUD ──────────────────────────────────────────────────────────────
function drawHUD() {
  const W = canvas.width;

  // HP bar
  const barW = 200, barH = 14;
  const hpPct = player.hp / player.maxHp;
  const bx = 20, by = 20;
  ctx.fillStyle = '#222233';
  ctx.fillRect(bx, by, barW, barH);
  const hpColor = hpPct > 0.5 ? '#00ffcc' : (hpPct > 0.25 ? '#ffaa00' : '#ff3366');
  ctx.fillStyle    = hpColor;
  ctx.shadowColor  = hpColor;
  ctx.shadowBlur   = 8;
  ctx.fillRect(bx, by, barW * hpPct, barH);
  ctx.shadowBlur   = 0;
  ctx.strokeStyle  = '#444466';
  ctx.lineWidth    = 1;
  ctx.strokeRect(bx, by, barW, barH);

  ctx.fillStyle    = '#ffffff';
  ctx.font         = '11px monospace';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`HP: ${Math.ceil(player.hp)}`, bx + 4, by + 1);

  // Score
  ctx.font         = 'bold 20px monospace';
  ctx.textAlign    = 'right';
  ctx.fillStyle    = '#ffff88';
  ctx.shadowColor  = '#ffff44';
  ctx.shadowBlur   = 10;
  ctx.fillText(`SCORE: ${player.score}`, W - 20, 22);
  ctx.shadowBlur = 0;

  // Level
  ctx.font         = 'bold 16px monospace';
  ctx.textAlign    = 'center';
  ctx.fillStyle    = '#88aaff';
  ctx.fillText(`LEVEL ${level}`, W / 2, 22);

  // Enemy count
  const remaining = Math.max(0, levelDef.total - spawned) + enemies.length;
  ctx.font      = '13px monospace';
  ctx.fillStyle = '#ff6688';
  ctx.fillText(`ENEMIES: ${remaining}`, W / 2, 44);

  // High score
  ctx.textAlign    = 'right';
  ctx.font         = '13px monospace';
  ctx.fillStyle    = '#aaaacc';
  ctx.fillText(`BEST: ${highScore}`, W - 20, 48);
}

// ─── Draw Crosshair ────────────────────────────────────────────────────────
function drawCrosshair() {
  const { x, y } = mouse;
  const size = 12, gap = 4;
  ctx.strokeStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur  = 8;
  ctx.lineWidth   = 1.5;

  ctx.beginPath();
  ctx.moveTo(x - size, y); ctx.lineTo(x - gap, y);
  ctx.moveTo(x + gap,  y); ctx.lineTo(x + size, y);
  ctx.moveTo(x, y - size); ctx.lineTo(x, y - gap);
  ctx.moveTo(x, y + gap);  ctx.lineTo(x, y + size);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, gap, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ─── Screen Overlays ───────────────────────────────────────────────────────
function drawMenuScreen() {
  const W = canvas.width, H = canvas.height;
  drawBackground();

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  glowText('NEON ASSAULT', W/2, H/2 - 110, '#00ffcc', 52, 30);
  glowText('Top-Down Shooter', W/2, H/2 - 55, '#88aaff', 22, 14);

  // Controls info
  ctx.fillStyle = '#aaaacc';
  ctx.font      = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WASD / Arrows to move   Mouse to aim   Click to shoot', W/2, H/2 - 10);

  // Start button area
  ctx.strokeStyle  = '#00ffcc';
  ctx.shadowColor  = '#00ffcc';
  ctx.shadowBlur   = 16;
  ctx.lineWidth    = 2;
  ctx.strokeRect(W/2 - 100, H/2 + 30, 200, 50);
  ctx.shadowBlur   = 0;
  glowText('[ PRESS ENTER ]', W/2, H/2 + 55, '#00ffcc', 20, 14);

  // High score
  if (highScore > 0) {
    glowText(`BEST: ${highScore}`, W/2, H/2 + 120, '#ffff88', 18, 10);
  }

  // Level badges
  ctx.fillStyle = '#333344';
  ctx.font      = '12px monospace';
  ctx.fillText('5 Levels of escalating chaos', W/2, H/2 + 155);

  drawCrosshair();
}

function drawLevelClearScreen() {
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = 'rgba(0,0,10,0.65)';
  ctx.fillRect(0, 0, W, H);

  glowText('LEVEL CLEAR!', W/2, H/2 - 50, '#00ffcc', 44, 24);
  glowText(`Score: ${player.score}`, W/2, H/2 + 10, '#ffff88', 26, 14);

  const sec = Math.ceil(levelClearTimer / 60);
  ctx.fillStyle = '#aaaacc';
  ctx.font      = '18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`Next level in ${sec}…`, W/2, H/2 + 60);

  drawCrosshair();
}

function drawGameOverScreen() {
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  glowText('GAME OVER', W/2, H/2 - 80, '#ff3366', 50, 28);
  glowText(`Score: ${player.score}`, W/2, H/2 - 10, '#ffff88', 28, 14);

  if (player.score >= highScore) {
    glowText('NEW HIGH SCORE!', W/2, H/2 + 40, '#00ffcc', 22, 14);
  } else {
    glowText(`Best: ${highScore}`, W/2, H/2 + 40, '#aaaacc', 20, 10);
  }

  ctx.fillStyle = '#888899';
  ctx.font      = '16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[ PRESS ENTER TO RETURN TO MENU ]', W/2, H/2 + 100);

  drawCrosshair();
}

function drawWinScreen() {
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = 'rgba(0,0,10,0.85)';
  ctx.fillRect(0, 0, W, H);

  glowText('YOU WIN!', W/2, H/2 - 90, '#ffff44', 54, 30);
  glowText('All 5 Levels Cleared!', W/2, H/2 - 30, '#00ffcc', 26, 16);
  glowText(`Final Score: ${player.score}`, W/2, H/2 + 30, '#ffff88', 28, 14);

  if (player.score >= highScore) {
    glowText('NEW HIGH SCORE!', W/2, H/2 + 80, '#00ffcc', 22, 14);
  }

  ctx.fillStyle = '#888899';
  ctx.font      = '16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[ PRESS ENTER TO RETURN TO MENU ]', W/2, H/2 + 130);

  drawCrosshair();
}

// ─── Master Render ─────────────────────────────────────────────────────────
function render() {
  const W = canvas.width, H = canvas.height;

  if (gameState === STATE.MENU) { drawMenuScreen(); return; }
  if (gameState === STATE.GAME_OVER) {
    drawBackground();
    ctx.save(); ctx.translate(shakeX, shakeY);
    drawBullets(); drawParticles(); enemies.forEach(drawEnemy); drawPlayer();
    ctx.restore();
    drawHUD();
    drawGameOverScreen();
    return;
  }
  if (gameState === STATE.WIN) {
    drawBackground();
    drawWinScreen();
    return;
  }

  drawBackground();

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBullets();
  drawParticles();
  enemies.forEach(drawEnemy);
  drawPlayer();

  ctx.restore();

  drawHUD();
  drawCrosshair();

  if (gameState === STATE.LEVEL_CLEAR) drawLevelClearScreen();
}

// ─── Game Loop ─────────────────────────────────────────────────────────────
function gameLoop(ts) {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ─── Click to start from menu ──────────────────────────────────────────────
canvas.addEventListener('click', () => {
  if (gameState === STATE.MENU) startGame();
  if (gameState === STATE.GAME_OVER || gameState === STATE.WIN) gameState = STATE.MENU;
});

// ─── Kick off ──────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
